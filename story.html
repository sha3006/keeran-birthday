<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Birthday Message ❤️</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/typed.js@2.1.0/dist/typed.umd.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:linear-gradient(135deg,#000,#1a1a1a);
display:flex;
justify-content:center;
align-items:center;
overflow:hidden;
color:white;
}

.card{
width:85%;
max-width:900px;
padding:50px;
border-radius:25px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(15px);
text-align:center;
box-shadow:0 0 50px rgba(255,215,0,.3);
}

h1{
color:#FFD700;
margin-bottom:30px;
font-size:3rem;
}

#typed{
font-size:24px;
line-height:1.8;
min-height:250px;
}

button{
margin-top:30px;
padding:15px 40px;
border:none;
background:#FFD700;
border-radius:50px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

button:hover{
transform:scale(1.1);
}

</style>

</head>

<body>

<div class="card">

<h1>💌 A Special Message</h1>

<div id="typed"></div>

<button onclick="window.location='gallery.html'">
View Memories 📸
</button>

</div>

<script>

new Typed("#typed",{
strings:[`Happy Birthday to the most wonderful person! ❤️

Today is all about celebrating you, the happiness you bring into people's lives, and the beautiful person you are.

You are a blessing in the lives of everyone who knows you. Your kindness, your strength, your smile, and your caring nature make people feel lucky to have you around.

On your special day, I pray that all your dreams come true, every goal you work for becomes a reality, and your life is filled with endless happiness, success, peace, and love.

I hope you achieve everything you wish for and receive all the happiness you truly deserve.

Keep shining, keep smiling, and keep being the amazing person that you are.

🎂 Happy Birthday ❤️`],
typeSpeed:35,
showCursor:true
});

gsap.from(".card",{
scale:0.5,
opacity:0,
duration:1.5
});

</script>

</body>
</html>
