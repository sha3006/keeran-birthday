<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Beautiful Memories ❤️</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#000,#1a1a1a);
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
}

h1{
color:gold;
margin-bottom:20px;
font-size:3rem;
text-shadow:0 0 20px gold;
}

.slider{
width:95%;
height:85vh;
position:relative;
overflow:hidden;
border-radius:25px;
background:black;
box-shadow:0 0 40px gold;
}

.slide{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
opacity:0;
transition:opacity 1.5s ease-in-out;
}

.slide.active{
opacity:1;
z-index:1;
}

.slide img{
max-width:100%;
max-height:100%;
width:auto;
height:auto;
object-fit:contain;
background:black;
animation:zoom 8s ease-in-out infinite;
}

@keyframes zoom{
0%{
transform:scale(1);
}
100%{
transform:scale(1);
}
}

button{
margin-top:25px;
padding:15px 40px;
font-size:18px;
font-weight:bold;
border:none;
border-radius:50px;
background:gold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
box-shadow:0 0 20px gold;
}

.caption{
position:absolute;
bottom:20px;
left:20px;
color:white;
font-size:22px;
background:rgba(0,0,0,.5);
padding:10px 20px;
border-radius:15px;
}

</style>
</head>

<body>

<h1>📸 Our Beautiful Memories ❤️</h1>

<div class="slider">

<div class="slide active">
<img src="./images/image1.jpg.jpeg" alt="">
<div class="caption">Beautiful Smile ❤️</div>
</div>

<div class="slide">
<img src="./images/image2.jpg.jpeg" alt="">
<div class="caption">A Moment To Remember ✨</div>
</div>

<div class="slide">
<img src="./images/image3.jpg.jpeg" alt="">
<div class="caption">Always Amazing 🌸</div>
</div>

<div class="slide">
<img src="./images/image4.jpg.jpeg" alt="">
<div class="caption">Beautiful Memories Together ❤️</div>
</div>

<div class="slide">
<img src="./images/image5.jpg.jpeg" alt="">
<div class="caption">Forever Special 🌹</div>
</div>

</div>

<button onclick="window.location='finale.html'">
Final Surprise 🎆
</button>

<script>

const slides=document.querySelectorAll(".slide");

let current=0;

function nextSlide(){

slides[current].classList.remove("active");

current++;

if(current>=slides.length){
current=0;
}

slides[current].classList.add("active");

}

setInterval(nextSlide,4000);

</script>

</body>
</html>
