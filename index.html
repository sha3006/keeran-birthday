<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
overflow:hidden;
height:100vh;
background:#000;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
color:white;
}

#tsparticles{
position:absolute;
width:100%;
height:100%;
z-index:0;
}

.container{
position:relative;
z-index:10;
text-align:center;
}

h1{
font-size:4rem;
margin-bottom:20px;
color:#FFD700;
text-shadow:
0 0 10px #FFD700,
0 0 20px #FFD700,
0 0 40px #FFD700;
opacity:0;
}

.gift-box{
font-size:120px;
cursor:pointer;
transition:.5s;
}

.gift-box:hover{
transform:scale(1.1);
}

.message{
font-size:22px;
margin-top:20px;
opacity:.8;
}

.btn{
display:none;
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:50px;
background:#FFD700;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
transform:scale(1.1);
}

</style>
</head>

<body>

<div id="tsparticles"></div>

<audio autoplay loop>
<source src="music/birthday.mp3" type="audio/mp3">
</audio>

<div class="container">

<h1 id="title">
Happy Birthday ❤️
</h1>

<div class="gift-box" id="gift">
🎁
</div>

<div class="message">
Click The Gift To Open Your Surprise
</div>

<button class="btn" id="nextBtn"
onclick="window.location='story.html'">
Open Memories ❤️
</button>

</div>

<script>

tsParticles.load("tsparticles",{
background:{
color:"#000"
},
particles:{
number:{
value:120
},
color:{
value:"#FFD700"
},
size:{
value:2
},
move:{
enable:true,
speed:1
},
opacity:{
value:0.7
}
}
});

const gift=document.getElementById("gift");
const title=document.getElementById("title");
const nextBtn=document.getElementById("nextBtn");

gift.addEventListener("click",()=>{

gsap.to(gift,{
scale:2,
rotation:720,
duration:1
});

confetti({
particleCount:250,
spread:180,
origin:{y:0.6}
});

setTimeout(()=>{

gift.style.display="none";

gsap.to(title,{
opacity:1,
duration:1
});

nextBtn.style.display="inline-block";

},1000);

});

</script>

</body>
</html>
